name: ShellCheck

on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: './scripts'

      - name: Run ShellCheck on init scripts
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: './init-pg'

      - name: Run ShellCheck on mysql init scripts
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: './init-mysql'
